x-airflow-common: &airflow-common
  build: .
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    PYTHONPATH: /opt/airflow
    # DQ framework DB connection — points to the postgres service inside Docker
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: airflow
    DB_USER: airflow
    DB_PASSWORD: airflow
    OPENLINEAGE_URL: http://marquez:5000
    DB_CONNECTION_STRING: postgresql+psycopg2://airflow:airflow@postgres/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./great_expectations:/opt/airflow/great_expectations
    - airflow-logs:/opt/airflow/logs
    - schema-baselines:/opt/airflow/great_expectations/schema_baselines
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  marquez:
    image: marquezproject/marquez:0.47.0
    ports:
      - "5010:5000"
      - "5011:5001"
    volumes:
      - marquez-data:/opt/marquez
    environment:
      MARQUEZ_CONFIG: |
        server:
          applicationConnectors:
            - type: http
              port: 5000
    restart: always

  marquez-web:
    image: marquezproject/marquez-web:0.47.0
    ports:
      - "3010:3000"
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
    depends_on:
      - marquez
    restart: always

volumes:
  postgres-db:
  airflow-logs:
  marquez-data:
  schema-baselines:
